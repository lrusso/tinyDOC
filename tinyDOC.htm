<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<title>TinyDOC Editor</title>
		<link rel="stylesheet" href="tinyDOC.css" type="text/css">
	</head>
	<body>
		<div class="tinydoc_menubar">
			<div class="tinydoc_holder">
				<div class="tinydoc_button_save_enabled" id="buttonSave"></div>
			</div>
			<div class="tinydoc_separator"></div>
			<div class="tinydoc_holder">
				<div class="tinydoc_button_print_enabled" id="buttonPrint"></div>
			</div>
			<div class="tinydoc_separator"></div>
			<div class="tinydoc_holder">
				<div class="tinydoc_button_undo_enabled" id="buttonUndo"></div>
			</div>
			<div class="tinydoc_holder">
				<div class="tinydoc_button_redo_enabled" id="buttonRedo"></div>
			</div>
			<div class="tinydoc_separator"></div>
			<div class="tinydoc_holder">
				<div class="tinydoc_button_find_enabled" id="buttonFind"></div>
			</div>
			<div class="tinydoc_button_find_box">
				<div class="tinydoc_holder">
					<div class="tinydoc_button_find_textbox1container">
						<input type="text" class="tinydoc_button_find_textbox1"/>
					</div>
				</div>
				<div class="tinydoc_holder">
					<div class="tinydoc_button_find_textbox2container">
						<input type="text" class="tinydoc_button_find_textbox2"/>
					</div>
				</div>
				<div class="tinydoc_holder">
					<div class="tinydoc_button_findnext_enabled" id="buttonFindNext"></div>
				</div>
			</div>
			<div class="tinydoc_separator"></div>
			<div class="tinydoc_holder">
				<div class="tinydoc_button_bold_enabled" id="buttonBold"></div>
			</div>
			<div class="tinydoc_holder">
				<div class="tinydoc_button_italic_enabled" id="buttonItalic"></div>
			</div>
			<div class="tinydoc_holder">
				<div class="tinydoc_button_underline_enabled" id="buttonUnderline"></div>
			</div>
			<div class="tinydoc_holder">
				<div class="tinydoc_button_strikethrough_enabled" id="buttonStrikethrough"></div>
			</div>
			<div class="tinydoc_separator"></div>
			<div class="tinydoc_holder">
				<div class="tinydoc_button_dotted_enabled" id="buttonDotted"></div>
			</div>
			<div class="tinydoc_holder">
				<div class="tinydoc_button_numbered_enabled" id="buttonNumbered"></div>
			</div>
			<div class="tinydoc_holder">
				<div class="tinydoc_button_highlight_enabled" id="buttonHighlight"></div>
			</div>
			<div class="tinydoc_holder">
				<div class="tinydoc_button_link_enabled" id="buttonLink"></div>
			</div>
			<div class="tinydoc_separator"></div>
			<div class="tinydoc_holder">
				<div class="tinydoc_button_template_enabled" id="buttonTemplate1"></div>
			</div>
			<div class="tinydoc_holder">
				<div class="tinydoc_button_template_enabled" id="buttonTemplate2"></div>
			</div>
			<div class="tinydoc_holder">
				<div class="tinydoc_button_template_enabled" id="buttonTemplate3"></div>
			</div>
			<div class="tinydoc_separator"></div>
			<div class="tinydoc_holder">
				<div class="tinydoc_button_calc_enabled" id="buttonCalc"></div>
			</div>
			<div class="tinydoc_separator"></div>
			<div class="tinydoc_holder">
				<div class="tinydoc_button_clear_enabled" id="buttonClear"></div>
			</div>
			<div class="tinydoc_separator"></div>
			<div class="tinydoc_holder">
				<div id="tinydoc_urlviewer"></div>
			</div>
		</div>

		<div class="tinydoc_splash"></div><div class="tinydoc_splash_container"></div>

		<div class="tinydoc_error"></div>
		<div class="tinydoc_saved"></div>
		<div class="tinydoc_notfound"></div>

		<div id="tinydoc_textcode" contenteditable="true"></div>

		<script src="tinyDOC.js"></script>
	</body>
</html>
